<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskScan AI - URL Threat Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen font-sans">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight text-indigo-400">RISK<span class="text-white">SCAN</span>.AI</h1>
        <div class="text-xs px-3 py-1 rounded-full bg-indigo-500/20 text-indigo-300 border border-indigo-500/30">Backend: Port 8080</div>
    </nav>

    <main class="max-w-4xl mx-auto py-16 px-4">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-4">Analyze the DNA of a URL</h2>
            <p class="text-slate-400">Real-time Phishing Detection via Machine Learning</p>
        </div>

        <div class="glass p-2 rounded-2xl flex items-center border border-slate-700 mb-8">
            <input type="text" id="urlInput" placeholder="Paste URL here..." class="bg-transparent flex-grow p-4 outline-none text-lg text-white">
            <button onclick="analyzeURL()" id="analyzeBtn" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-xl font-bold transition-all">
                Analyze
            </button>
        </div>

        <div id="resultCard" class="hidden glass border border-slate-700 rounded-3xl p-8">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="relative w-48 h-48">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="8"/>
                        <circle id="scoreCircle" cx="50" cy="50" r="45" fill="none" stroke="#6366f1" stroke-width="8" 
                            stroke-dasharray="283" stroke-dashoffset="283" style="transition: stroke-dashoffset 1s ease-out;"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="scoreText" class="text-4xl font-black">0%</span>
                        <span class="text-xs uppercase tracking-widest text-slate-500 font-bold">Risk</span>
                    </div>
                </div>

                <div class="flex-grow">
                    <h3 id="statusLabel" class="text-3xl font-bold mb-2">Analyzing...</h3>
                    <p id="explanationText" class="text-slate-400 mb-6">Connecting to Python AI...</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                            <div class="text-[10px] text-slate-500 uppercase">Dots Detection</div>
                            <div id="dotsVal" class="font-mono text-indigo-300">...</div>
                        </div>
                        <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                            <div class="text-[10px] text-slate-500 uppercase">SSL Status</div>
                            <div id="httpsVal" class="font-mono text-indigo-300">...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function analyzeURL() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            if (!url) return;

            const card = document.getElementById('resultCard');
            const explanation = document.getElementById('explanationText');
            const btn = document.getElementById('analyzeBtn');
            
            card.classList.remove('hidden');
            explanation.innerText = "Processing through Random Forest Model...";
            btn.innerText = "Thinking...";
            btn.disabled = true;

            try {
                // Connection to Port 8080 for Mac M1
                const response = await fetch('http://127.0.0.1:8080/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                if (!response.ok) throw new Error("Backend Offline");

                const result = await response.json();
                const risk = result.risk_score;

                document.getElementById('scoreText').innerText = Math.round(risk) + '%';
                const offset = 283 - (283 * risk / 100);
                document.getElementById('scoreCircle').style.strokeDashoffset = offset;
                document.getElementById('scoreCircle').style.stroke = risk > 50 ? '#ef4444' : '#22c55e';
                
                document.getElementById('statusLabel').innerText = risk > 50 ? 'MALICIOUS' : 'SAFE';
                document.getElementById('statusLabel').className = risk > 50 ? 'text-3xl font-bold mb-2 text-red-500' : 'text-3xl font-bold mb-2 text-green-500';
                
                document.getElementById('dotsVal').innerText = result.features.num_dots > 2 ? 'High' : 'Normal';
                document.getElementById('httpsVal').innerText = result.features.has_https ? 'Secure' : 'No SSL';
                explanation.innerText = `Analysis complete. Risk probability: ${risk}%`;

            } catch (error) {
                explanation.innerText = "Error: Is app.py running on Port 8080?";
                console.error(error);
            } finally {
                btn.innerText = "Analyze";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
